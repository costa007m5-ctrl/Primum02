<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#e50914" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="color-scheme" content="dark" />
    
    <!-- Preconnect para CDNs frequentes -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://teradl.kingx.dev" crossorigin />
    <link rel="preconnect" href="https://player.kingx.dev" crossorigin />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>NetPremium</title>
    
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "581f23c1-2b57-4646-8780-6cd2ccbba30e",
        });
      });
    </script>
    
    <!-- CSS critico inline para carregamento instantaneo -->
    <style>
      html, body, #root { 
        margin: 0; padding: 0; 
        background: #000; 
        min-height: 100vh; 
        min-height: 100dvh;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      body { 
        font-family: system-ui, -apple-system, sans-serif; 
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }
      /* Loading state */
      #root:empty::after {
        content: '';
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 48px; height: 48px;
        border: 4px solid #e50914;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
